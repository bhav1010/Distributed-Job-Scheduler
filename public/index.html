<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Job Scheduler Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 2rem; background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 50%); min-height: 100vh;}
        .container { max-width: 1300px; margin: 0 auto; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; }
        .stat-card { text-align: center; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent-color); }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; margin-top: 0.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: #94a3b8; text-transform: uppercase; font-size: 0.7rem; }
        .badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .status-Queued { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .status-Running, .status-Claimed { background: rgba(234,179,8,0.2); color: #facc15; }
        .status-Completed { background: rgba(34,197,94,0.2); color: #4ade80; }
        .status-Failed { background: rgba(239,68,68,0.2); color: #f87171; }
        .status-DeadLetter { background: rgba(100,116,139,0.2); color: #94a3b8; }
        .status-Active { background: rgba(34,197,94,0.2); color: #4ade80; }
        .status-Offline { background: rgba(100,116,139,0.2); color: #94a3b8; }
        button { background: var(--accent-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 0.875rem; }
        button:hover { opacity: 0.9; }
        input, select { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; padding: 0.5rem; border-radius: 4px; margin-right: 0.5rem;}
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Distributed Job Scheduler <span style="font-size:1rem; color:#94a3b8; font-weight:normal;">v2.0 (Full Lifecycle & Retry Policies)</span></h1>
        
        <div class="glass-panel">
            <h2>System Health Metrics</h2>
            <div class="stats-grid" id="stats">Loading...</div>
        </div>

        <div class="grid-2">
            <div class="glass-panel">
                <h2>Worker Nodes</h2>
                <table>
                    <thead><tr><th>ID</th><th>Status</th><th>Last Heartbeat</th></tr></thead>
                    <tbody id="workers-body"></tbody>
                </table>
            </div>
            
            <div class="glass-panel">
                <h2>Job Queues</h2>
                <table>
                    <thead><tr><th>ID</th><th>Project</th><th>Name</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="queues-body"></tbody>
                </table>
                <div style="margin-top:1rem;">
                    <button onclick="createQueue()">+ New Queue</button>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:1rem;">
                <h2>Job Explorer</h2>
                <div>
                    <button onclick="enqueueBatch()">Enqueue Batch</button>
                    <button onclick="createJob(false, true)">Enqueue Recurring (Cron)</button>
                    <button onclick="createJob(false)">Enqueue Immediate</button>
                    <button onclick="createJob(true)" style="background: #ef4444;">Enqueue Failing (Test Retries)</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Status</th><th>Queue</th><th>Payload</th><th>Retries</th><th>Scheduled For</th>
                    </tr>
                </thead>
                <tbody id="jobs-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        async function fetchStats() {
            const res = await fetch(`${API}/stats`);
            const data = await res.json();
            document.getElementById('stats').innerHTML = Object.entries(data).map(([key, value]) => `
                <div class="stat-card">
                    <div class="stat-value">${value}</div>
                    <div class="stat-label">${key}</div>
                </div>
            `).join('');
        }

        async function fetchWorkers() {
            const res = await fetch(`${API}/workers`);
            const workers = await res.json();
            document.getElementById('workers-body').innerHTML = workers.map(w => `
                <tr>
                    <td style="font-family:monospace;">${w.id.split('-')[0]}...</td>
                    <td><span class="badge status-${w.status}">${w.status}</span></td>
                    <td>${new Date(w.last_heartbeat).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }

        async function fetchQueues() {
            const res = await fetch(`${API}/queues`);
            const queues = await res.json();
            document.getElementById('queues-body').innerHTML = queues.map(q => `
                <tr>
                    <td>#${q.id}</td>
                    <td>${q.project_name}</td>
                    <td>${q.name}</td>
                    <td><span class="badge ${q.is_paused ? 'status-Offline' : 'status-Active'}">${q.is_paused ? 'Paused' : 'Active'}</span></td>
                    <td>
                        <button style="padding: 0.25rem 0.5rem; font-size: 0.7rem; background: ${q.is_paused ? '#22c55e' : '#eab308'};" onclick="toggleQueue(${q.id})">
                            ${q.is_paused ? '▶ Resume' : '⏸ Pause'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function fetchJobs() {
            const res = await fetch(`${API}/jobs?limit=15`);
            const jobs = await res.json();
            document.getElementById('jobs-body').innerHTML = jobs.map(job => `
                <tr>
                    <td>#${job.id}</td>
                    <td><span class="badge status-${job.status}">${job.status}</span></td>
                    <td>${job.queue_name}</td>
                    <td style="font-family: monospace; font-size: 0.75rem;">${job.payload}</td>
                    <td>${job.retries_attempted} / ${job.max_retries}</td>
                    <td>${new Date(job.scheduled_at).toLocaleTimeString()} ${job.cron_expression ? '🔄' : ''}</td>
                </tr>
            `).join('');
        }

        async function createQueue() {
            const name = prompt("Enter new queue name:");
            if (!name) return;
            await fetch(`${API}/queues`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, priority: 1, concurrency_limit: 5 })
            });
            refresh();
        }

        async function createJob(shouldFail, recurring = false) {
            const body = {
                queue_id: 1,
                payload: { task: 'process_data', shouldFail, timestamp: Date.now() }
            };
            if (recurring) body.cron_expression = '0 * * * *'; // Mock cron
            
            await fetch(`${API}/jobs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            refresh();
        }

        async function toggleQueue(id) {
            await fetch(`${API}/queues/${id}/toggle`, { method: 'PUT' });
            refresh();
        }

        async function enqueueBatch() {
            const payload = [
                { task: 'batch_item_1' },
                { task: 'batch_item_2' },
                { task: 'batch_item_3' }
            ];
            await fetch(`${API}/jobs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ queue_id: 1, payload })
            });
            refresh();
        }

        function refresh() {
            fetchStats();
            fetchWorkers();
            fetchQueues();
            fetchJobs();
        }

        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>
